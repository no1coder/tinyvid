name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      # Download platform-specific ffmpeg/ffprobe binaries
      - name: Download FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          gh release download ffmpeg-binaries --pattern 'ffmpeg-macos-arm64.tar.gz' --dir /tmp
          tar xzf /tmp/ffmpeg-macos-arm64.tar.gz -C src-tauri/
          # Rename binaries to match the current build target
          if [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            mv src-tauri/binaries/ffmpeg-aarch64-apple-darwin src-tauri/binaries/ffmpeg-x86_64-apple-darwin
            mv src-tauri/binaries/ffprobe-aarch64-apple-darwin src-tauri/binaries/ffprobe-x86_64-apple-darwin
          fi
          ls -la src-tauri/binaries/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download FFmpeg (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-extracted
          $ffmpegDir = Get-ChildItem -Path ffmpeg-extracted -Directory | Select-Object -First 1
          Copy-Item "$($ffmpegDir.FullName)/bin/ffmpeg.exe" "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"
          Copy-Item "$($ffmpegDir.FullName)/bin/ffprobe.exe" "src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe"
          # Windows doesn't need the lib directory
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries/lib" | Out-Null

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TinyVid ${{ github.ref_name }}"
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}
